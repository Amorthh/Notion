<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>welcome</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #191919;
    --card: #202020;
    --border: rgba(255, 255, 255, 0.09);
    --text-primary: #ededed;
    --text-muted: #9b9b9b;
    --text-faint: #6f6f6f;

    --accent: #8fa8d9;
    --accent-pale: #c3d1ef;
    --accent-dim: rgba(143, 168, 217, 0.16);
  }

  html, body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    width: 100%;
    min-height: 100%;
  }

  body {
    display: flex;
    justify-content: center;
    padding: clamp(16px, 3vw, 28px);
  }

  .card {
    width: 100%;
    max-width: 1200px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: clamp(28px, 4vw, 48px) clamp(28px, 5vw, 56px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: clamp(20px, 4vw, 48px);
  }

  .sentence {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: clamp(20px, 2.4vw, 32px);
    line-height: 1.45;
    letter-spacing: -0.01em;
    color: var(--text-primary);
    max-width: 780px;
  }

  .sentence .name,
  .sentence .highlight {
    font-weight: 500;
    color: var(--accent-pale);
  }

  .sentence .motivation {
    font-style: italic;
    color: var(--text-muted);
  }

  .weather-badge {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 22px;
    background: var(--accent-dim);
    border-radius: 14px;
  }

  .weather-icon {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
    color: var(--accent);
  }
  .weather-icon svg { width: 100%; height: 100%; }

  .weather-figures {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .weather-temps {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
  }

  .weather-caption {
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.03em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  @media (max-width: 680px) {
    .card {
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
    }
    .sentence { max-width: none; }
    .weather-badge { align-self: stretch; }
  }
</style>
</head>
<body>

<div class="card">
  <p class="sentence" id="sentence">
    Welcome, <span class="name">Kocyk</span>. Today is <span class="highlight" id="date-part">Sunday, July 19</span>. The weather in Magdeburg is <span class="highlight" id="weather-part">checking the forecast…</span>. <span class="motivation" id="motivation-part"></span>
  </p>

  <div class="weather-badge">
    <div class="weather-icon" id="weather-icon"></div>
    <div class="weather-figures">
      <div class="weather-temps" id="weather-temps">–°</div>
      <div class="weather-caption" id="weather-caption">loading</div>
    </div>
  </div>
</div>

<script>
(function () {
  var LAT = 52.1205, LON = 11.6276;
  var TIMEZONE = 'Europe/Berlin';

  var WEEKDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  var ICONS = {
    sun: '<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="20" cy="20" r="8"/><path d="M20 4v4M20 32v4M4 20h4M32 20h4M9 9l3 3M28 28l3 3M31 9l-3 3M12 28l-3 3"/></svg>',
    cloud: '<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 27h17a6 6 0 0 0 0-12 8 8 0 0 0-15.3-2.6A6.5 6.5 0 0 0 12 27z"/></svg>',
    partly: '<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13" cy="14" r="5.5"/><path d="M13 4v2.4M22.5 14h-2.4M5.5 14H3.1M6.6 7.6l1.7 1.7M19.4 7.6l-1.7 1.7"/><path d="M15 29h13a5 5 0 0 0 0-10 6.5 6.5 0 0 0-12.2-2"/></svg>',
    rain: '<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 22h17a6 6 0 0 0 0-12 8 8 0 0 0-15.3-2.6A6.5 6.5 0 0 0 11 22z"/><path d="M14 27l-2 5M20 27l-2 5M26 27l-2 5"/></svg>',
    storm: '<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20h17a6 6 0 0 0 0-12 8 8 0 0 0-15.3-2.6A6.5 6.5 0 0 0 11 20z"/><path d="M21 22l-5 8h5l-4 7"/></svg>',
    snow: '<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20h17a6 6 0 0 0 0-12 8 8 0 0 0-15.3-2.6A6.5 6.5 0 0 0 11 20z"/><path d="M14 27v7M11.5 30.5l5 3M18.5 30.5l-5 3M23 27v7M20.5 30.5l5 3M27.5 30.5l-5 3"/></svg>',
    fog: '<svg viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 15h20M6 21h24M8 27h20M12 33h16"/></svg>'
  };

  var WEATHER_CODE_MAP = {
    0:  { desc: 'clear skies', icon: 'sun' },
    1:  { desc: 'mostly clear', icon: 'partly' },
    2:  { desc: 'partly cloudy', icon: 'partly' },
    3:  { desc: 'overcast', icon: 'cloud' },
    45: { desc: 'foggy', icon: 'fog' },
    48: { desc: 'foggy with frost haze', icon: 'fog' },
    51: { desc: 'a light drizzle', icon: 'rain' },
    53: { desc: 'drizzle', icon: 'rain' },
    55: { desc: 'a steady drizzle', icon: 'rain' },
    56: { desc: 'freezing drizzle', icon: 'rain' },
    57: { desc: 'freezing drizzle', icon: 'rain' },
    61: { desc: 'light rain', icon: 'rain' },
    63: { desc: 'rain', icon: 'rain' },
    65: { desc: 'heavy rain', icon: 'rain' },
    66: { desc: 'freezing rain', icon: 'rain' },
    67: { desc: 'freezing rain', icon: 'rain' },
    71: { desc: 'light snow', icon: 'snow' },
    73: { desc: 'snow', icon: 'snow' },
    75: { desc: 'heavy snow', icon: 'snow' },
    77: { desc: 'snow grains', icon: 'snow' },
    80: { desc: 'scattered showers', icon: 'rain' },
    81: { desc: 'showers', icon: 'rain' },
    82: { desc: 'heavy showers', icon: 'rain' },
    85: { desc: 'snow showers', icon: 'snow' },
    86: { desc: 'heavy snow showers', icon: 'snow' },
    95: { desc: 'thunderstorms', icon: 'storm' },
    96: { desc: 'thunderstorms with hail', icon: 'storm' },
    99: { desc: 'thunderstorms with hail', icon: 'storm' }
  };

  var SEASONAL_FALLBACK = {
    0: { desc: 'cold and overcast', icon: 'cloud', low: -1, high: 3 },
    1: { desc: 'cold, with a chance of light snow', icon: 'snow', low: -1, high: 4 },
    2: { desc: 'mild and breezy', icon: 'partly', low: 2, high: 10 },
    3: { desc: 'cool with sunny spells', icon: 'partly', low: 4, high: 14 },
    4: { desc: 'pleasant and partly cloudy', icon: 'partly', low: 8, high: 18 },
    5: { desc: 'warm with occasional showers', icon: 'rain', low: 12, high: 22 },
    6: { desc: 'warm and mostly sunny', icon: 'sun', low: 14, high: 24 },
    7: { desc: 'warm and mostly sunny', icon: 'sun', low: 15, high: 25 },
    8: { desc: 'mild and partly cloudy', icon: 'partly', low: 11, high: 21 },
    9: { desc: 'cool with light rain', icon: 'rain', low: 7, high: 15 },
    10: { desc: 'cool and overcast', icon: 'cloud', low: 3, high: 9 },
    11: { desc: 'cold and grey', icon: 'cloud', low: 0, high: 5 }
  };

  var MOTIVATIONS = [
    'This is your day.',
    'Make it count.',
    'Do your best.',
    'One step at a time.',
    'You\u2019ve got this.',
    'Small steps, big wins.',
    'Stay curious.',
    'Trust the process.',
    'Keep going.',
    'Today is a fresh start.',
    'Progress over perfection.',
    'Be kind to yourself today.',
    'Breathe. You\u2019re doing fine.',
    'Onward.'
  ];

  function setMotivation(now) {
    var start = new Date(now.getFullYear(), 0, 0);
    var diff = now - start;
    var dayOfYear = Math.floor(diff / 86400000);
    var phrase = MOTIVATIONS[dayOfYear % MOTIVATIONS.length];
    document.getElementById('motivation-part').textContent = phrase;
  }

  function setDate() {
    var now = new Date();
    document.getElementById('date-part').textContent =
      WEEKDAYS[now.getDay()] + ', ' + MONTHS[now.getMonth()] + ' ' + now.getDate();
    setMotivation(now);
    return now;
  }

  function setWeatherIcon(key) {
    document.getElementById('weather-icon').innerHTML = ICONS[key] || ICONS.partly;
  }

  function applyWeather(desc, low, high, caption) {
    document.getElementById('weather-part').textContent = desc;
    document.getElementById('weather-temps').textContent = Math.round(low) + '° / ' + Math.round(high) + '°';
    document.getElementById('weather-caption').textContent = caption;
  }

  function applyFallback(monthIndex) {
    var f = SEASONAL_FALLBACK[monthIndex];
    setWeatherIcon(f.icon);
    applyWeather(f.desc + ' — highs near ' + f.high + '\u00b0C', f.low, f.high, 'typical for this time of year');
  }

  async function loadWeather() {
    var now = setDate();
    var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + LAT + '&longitude=' + LON +
      '&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=' + encodeURIComponent(TIMEZONE);

    try {
      var controller = new AbortController();
      var timeoutId = setTimeout(function () { controller.abort(); }, 6000);
      var res = await fetch(url, { signal: controller.signal });
      clearTimeout(timeoutId);
      if (!res.ok) throw new Error('bad response');
      var json = await res.json();

      var code = json.daily.weathercode[0];
      var high = json.daily.temperature_2m_max[0];
      var low = json.daily.temperature_2m_min[0];
      var info = WEATHER_CODE_MAP[code] || { desc: 'mixed conditions', icon: 'partly' };

      setWeatherIcon(info.icon);
      applyWeather(info.desc + ', with highs near ' + Math.round(high) + '\u00b0C', low, high, 'today\u2019s forecast');
    } catch (e) {
      applyFallback(now.getMonth());
    }
  }

  loadWeather();
})();
</script>

</body>
</html>
